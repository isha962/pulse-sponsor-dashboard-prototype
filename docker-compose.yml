services:
  db:
    image: postgres:16
    container_name: psd_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulse"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    container_name: psd_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/pulse
      MOCK_USER_ID: sponsor_123
      MOCK_ROLE: sponsor
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8001
    container_name: psd_frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
